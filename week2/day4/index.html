<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <title>Document</title>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header
      class="bg-white shadow p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4"
    >
      <h1 class="text-2xl font-bold">📝 Notes App</h1>

      <input
        type="text"
        id="search-input"
        placeholder="Search notes..."
        class="w-full sm:w-64 px-3 py-2 border rounded-md focus:outline-none focus:ring focus:ring-blue-300"
      />
    </header>

    <!-- Form Section -->
    <section class="max-w-3xl mx-auto mt-6 bg-white p-6 rounded-lg shadow">
      <form id="note-form" class="space-y-5">
        <h2 id="form-title" class="text-xl font-semibold">Add New Note</h2>

        <!-- Title -->
        <div>
          <label for="note-title" class="block font-medium mb-1"> Title </label>
          <input
            type="text"
            id="note-title"
            placeholder="Enter note title"
            maxlength="50"
            required
            class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring focus:ring-blue-300"
          />

          <div class="flex justify-between text-sm mt-1">
            <span id="title-counter" class="text-gray-500"> 0 / 50 </span>
          </div>
        </div>

        <!-- Content -->
        <div>
          <label for="note-content" class="block font-medium mb-1">
            Content
          </label>
          <textarea
            id="note-content"
            rows="6"
            maxlength="500"
            required
            placeholder="Write your note here..."
            class="w-full px-3 py-2 border rounded-md resize-none focus:outline-none focus:ring focus:ring-blue-300"
          ></textarea>

          <div class="flex justify-between text-sm mt-1">
            <span id="content-counter" class="text-gray-500"> 0 / 500 </span>
          </div>
        </div>

        <!-- Color Picker -->
        <div>
          <label class="block font-medium mb-2">Note Color</label>

          <div class="flex gap-4">
            <!-- Yellow -->
            <label class="cursor-pointer">
              <input
                type="radio"
                name="note-color"
                value="bg-yellow-200"
                class="peer hidden"
                checked
              />
              <div
                class="w-6 h-6 rounded-full bg-yellow-200 border peer-checked:ring-2 peer-checked:ring-orange-500"
              ></div>
            </label>

            <!-- Blue -->
            <label class="cursor-pointer">
              <input
                type="radio"
                name="note-color"
                value="bg-blue-200"
                class="peer hidden"
              />
              <div
                class="w-6 h-6 rounded-full bg-blue-200 border peer-checked:ring-2 peer-checked:ring-orange-500"
              ></div>
            </label>

            <!-- Green -->
            <label class="cursor-pointer">
              <input
                type="radio"
                name="note-color"
                value="bg-green-200"
                class="peer hidden"
              />
              <div
                class="w-6 h-6 rounded-full bg-green-200 border peer-checked:ring-2 peer-checked:ring-orange-500"
              ></div>
            </label>

            <!-- Pink -->
            <label class="cursor-pointer">
              <input
                type="radio"
                name="note-color"
                value="bg-pink-200"
                class="peer hidden"
              />
              <div
                class="w-6 h-6 rounded-full bg-pink-200 border peer-checked:ring-2 peer-checked:ring-orange-500"
              ></div>
            </label>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex gap-3">
          <button
            type="submit"
            id="submit-btn"
            class="px-4 py-2 bg-blue-500 text-white rounded-md opacity-50 focus:bg-blue-700 hover:bg-blue-600 cursor-pointer"
          >
            Add Note
          </button>

          <button
            type="button"
            id="cancel-btn"
            hidden
            class="px-4 py-2 bg-gray-300 rounded-md"
          >
            Cancel
          </button>
        </div>
      </form>
    </section>

    <!-- Notes Info -->
    <section class="max-w-6xl mx-auto mt-6 px-4">
      <p id="notes-count" class="text-gray-600">
        Total Notes: <span id="total-notes">0</span>
      </p>
    </section>

    <!-- Notes Grid -->
    <main
      id="notes-container"
      class="max-w-6xl mx-auto mt-4 px-4 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"
    >
      <!-- Note Cards Here ... -->
    </main>

    <!-- Empty State -->
    <section id="empty-note" class="text-center mt-12 text-gray-500">
      <p>No notes found. Start by adding one ✨</p>
    </section>
    <script src="index.js"></script>
  </body>
</html>
