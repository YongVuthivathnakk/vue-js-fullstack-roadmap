<!DOCTYPE html>
<html>
  <head>
    <title>Product Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header
      class="bg-white shadow-md p-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4"
    >
      <h1 class="text-2xl font-bold text-gray-800">Our Products</h1>

      <div class="flex items-center gap-4">
        <button
          id="add-product"
          onclick="addProduct()"
          class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Add New Product
        </button>

        <div id="product-count" class="text-gray-600 font-medium">
          Total Products: 0
        </div>
      </div>
    </header>

    <!-- Products -->
    <div
      id="products-container"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 p-6"
    ></div>
    <script src="products.js"></script>
  </body>
</html>
