<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
  </head>
  <body class="bg-gray-100 min-h-screen p-6" id="app">
    <!-- Header -->
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">User Management</h1>
      <button
        @click="openAddForm"
        class="bg-blue-600 text-white px-4 py-2 rounded"
      >
        + Add User
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white p-4 rounded shadow">
        <p class="text-sm text-gray-500">Admins</p>
        <p class="text-xl font-bold">{{totalAdmins}}</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p class="text-sm text-gray-500">Users</p>
        <p class="text-xl font-bold">{{totalUsers}}</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p class="text-sm text-gray-500">Guests</p>
        <p class="text-xl font-bold">{{totalGuest}}</p>
      </div>
      <div class="bg-white p-4 rounded shadow">
        <p class="text-sm text-gray-500">Active Users</p>
        <p class="text-xl font-bold">{{totalActive}}</p>
      </div>
    </div>

    <div
      v-if="showForm"
      class="fixed inset-0 bg-black/40 flex items-center justify-center"
    >
      <div class="bg-white w-full max-w-md p-6 rounded-lg shadow">
        <h2 class="text-xl font-bold mb-4">
          {{ editingUser ? "Edit User" : "Add User" }}
        </h2>

        <form @submit.prevent="saveUser" class="space-y-3">
          <input
            v-model="form.name"
            type="text"
            placeholder="Name"
            class="w-full border px-3 py-2 rounded"
            required
          />

          <input
            v-model="form.email"
            type="email"
            placeholder="Email"
            class="w-full border px-3 py-2 rounded"
            required
          />

          <input
            v-model="form.image"
            type="text"
            placeholder="Avatar URL"
            class="w-full border px-3 py-2 rounded"
          />

          <select v-model="form.role" class="w-full border px-3 py-2 rounded">
            <option>Admin</option>
            <option>User</option>
            <option>Guest</option>
          </select>

          <select v-model="form.status" class="w-full border px-3 py-2 rounded">
            <option>Active</option>
            <option>Inactive</option>
            <option>Suspended</option>
          </select>

          <input
            v-model="form.joined"
            type="date"
            class="w-full border px-3 py-2 rounded"
          />

          <div class="flex gap-2 pt-2">
            <button
              type="submit"
              class="flex-1 bg-blue-600 text-white py-2 rounded"
            >
              Save
            </button>

            <button
              type="button"
              @click="closeForm"
              class="flex-1 border py-2 rounded"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-4 mb-6">
      <input
        v-model="search"
        type="text"
        placeholder="Search name or email"
        class="px-4 py-2 border rounded w-full md:w-64"
      />

      <select class="px-4 py-2 border rounded" v-model="selectedRole">
        <option value="All">All Roles</option>
        <option value="Admin">Admin</option>
        <option value="User">User</option>
        <option value="Guest">Guest</option>
      </select>

      <select class="px-4 py-2 border rounded" v-model="selectedStatus">
        <option value="All">All Status</option>
        <option value="Active">Active</option>
        <option value="Inactive">Inactive</option>
        <option value="Suspended">Suspended</option>
      </select>
    </div>

    <!-- User Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div
        v-if="filteredUsers.length === 0"
        class="col-span-full text-center text-gray-500 py-10"
      >
        No data
      </div>

      <div
        v-else
        v-for="user in filteredUsers"
        :key="index"
        class="bg-white p-4 rounded-lg shadow"
      >
        <div class="flex items-center gap-4 mb-3">
          <img
            :src="user.image"
            :alt="user.name"
            class="w-14 h-14 rounded-full"
          />
          <div>
            <h3 class="font-bold">{{user.name}}</h3>
            <p class="text-sm text-gray-500">{{user.email}}</p>
          </div>
        </div>
        <div class="flex justify-between items-center mb-2">
          <span
            class="px-2 py-1 text-xs rounded"
            :class="getRoleClass(user.role)"
          >
            {{user.role}}
          </span>
          <span
            class="px-2 py-1 text-xs rounded"
            :class="getStatusClass(user.status)"
            >{{user.status}}</span
          >
        </div>
        <p class="text-sm text-gray-500 mb-3">Joined: {{user.joined}}</p>
        <div class="flex gap-2">
          <button
            class="flex-1 border px-3 py-1 rounded"
            @click="openEditForm(user)"
          >
            Edit
          </button>
          <button
            @click="onDelete(user.id)"
            class="flex-1 bg-red-500 text-white px-3 py-1 rounded"
          >
            Delete
          </button>
        </div>
      </div>
    </div>
    <script>
      const { createApp } = Vue;
      const app = createApp({
        data() {
          return {
            search: "",
            selectedRole: "All",
            selectedStatus: "All",
            showForm: false,
            editingUser: null,
            form: {
              name: "",
              email: "",
              role: "User",
              status: "Active",
              image: "",
              joined: "",
            },
            users: [
              {
                id: 1,
                image: "https://i.pravatar.cc/150?img=1",
                name: "John Doe",
                email: "john@example.com",
                role: "Admin",
                roleClass: "bg-blue-100 text-blue-700",
                status: "Active",
                statusClass: "bg-green-100 text-green-700",
                joined: "2024-01-15",
              },
              {
                id: 2,
                image: "https://i.pravatar.cc/150?img=2",
                name: "Jane Smith",
                email: "jane@example.com",
                role: "User",
                roleClass: "bg-gray-200 text-gray-700",
                status: "Inactive",
                statusClass: "bg-yellow-100 text-yellow-700",
                joined: "2024-02-10",
              },
              {
                id: 3,
                image: "https://i.pravatar.cc/150?img=3",
                name: "Tom Guest",
                email: "tom@example.com",
                role: "Guest",
                roleClass: "bg-purple-100 text-purple-700",
                status: "Suspended",
                statusClass: "bg-red-100 text-red-700",
                joined: "2024-03-01",
              },
            ],
          };
        },
        methods: {
          openAddForm() {
            this.editingUser = null;
            this.form = {
              name: "",
              email: "",
              role: "User",
              status: "Active",
              image: "",
              joined: "",
            };
            this.showForm = true;
          },

          openEditForm(user) {
            this.editingUser = user;
            this.form = { ...user };
            this.showForm = true;
          },

          closeForm() {
            this.showForm = false;
          },

          saveUser() {
            if (this.editingUser) {
              // EDIT
              Object.assign(this.editingUser, this.form);
            } else {
              // ADD
              this.users.push({
                ...this.form,
                id: Date.now(),
              });
            }

            this.closeForm();
          },
          getRoleClass(role) {
            switch (role) {
              case "Admin":
                return "bg-blue-100 text-blue-700";
              case "User":
                return "bg-gray-200 text-gray-700";
              case "Guest":
                return "bg-purple-100 text-purple-700";
            }
          },
          getStatusClass(status) {
            switch (status) {
              case "Active":
                return "bg-green-100 text-green-700";
              case "Inactive":
                return "bg-yellow-100 text-yellow-700";
              case "Suspended":
                return "bg-red-100 text-red-700";
            }
          },
          onDelete(id) {
            const isConfirm = window.confirm(
              "Are you sure you want to delete this user?",
            );
            if (isConfirm) {
              this.users = this.users.filter((u) => u.id !== id);
            }
          },
        },
        computed: {
          filteredUsers() {
            return this.users.filter((user) => {
              const matchesSearch =
                user.name.toLowerCase().includes(this.search.toLowerCase()) ||
                user.email.toLowerCase().includes(this.search.toLowerCase());

              const matchesRole =
                this.selectedRole === "All" || user.role === this.selectedRole;
              const matchesStatus =
                this.selectedStatus === "All" ||
                user.status === this.selectedStatus;
              return matchesSearch && matchesRole && matchesStatus;
            });
          },
          totalAdmins() {
            return this.users.filter((user) => user.role === "Admin").length;
          },
          totalUsers() {
            return this.users.filter((user) => user.role === "User").length;
          },
          totalGuest() {
            return this.users.filter((user) => user.role === "Guest").length;
          },
          totalActive() {
            return this.users.filter((user) => user.status === "Active").length;
          },
        },
      });

      app.mount("#app");
    </script>
  </body>
</html>
