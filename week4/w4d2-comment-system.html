<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="app">{{data}}</div>
    <script>
      const { createApp } = Vue;
      const app = createApp({
        data() {
          return {
            data: "Hello From Vue",
          };
        },
      });

      app.mount("#app");
    </script>
  </body>
</html>
